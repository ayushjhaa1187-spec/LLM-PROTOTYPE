"""CI/CD Pipeline with Security Scanning (CICD-01).

Includes automated testing for backend/frontend and security audits (Bandit, TruffleHog).
"""

name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # needed for trufflehog

      - name: Bandit Security Scan (Python)
        run: |
          pip install bandit
          bandit -r backend/ -f json -o bandit-report.json || true
          
      - name: TruffleHog OSS (Secret Detection)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Upload Security Report
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: bandit-report.json

  backend-test:
    needs: security-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run Tests with Coverage
        run: pytest --cov=app --cov-report=xml
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
      - name: Install & Build
        run: |
          npm install
          npm run build
      - name: Run Lint
        run: npm run lint
